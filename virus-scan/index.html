        <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>手机安全扫描</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        .card {
            width: 100%;
            max-width: 360px;
            background: #16213e;
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            text-align: center;
        }
        .shield-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #00d2ff;
        }
        .subtitle {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 30px;
        }
        #scan-btn {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border: none;
            color: white;
            padding: 16px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
            transition: transform 0.2s, opacity 0.3s;
            box-shadow: 0 4px 15px rgba(0,210,255,0.4);
        }
        #scan-btn:active {
            transform: scale(0.96);
        }
        #scan-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #2a2a4a;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            transition: width 0.3s ease;
        }
        #virus-list {
            list-style: none;
            text-align: left;
            margin: 15px 0;
            max-height: 220px;
            overflow-y: auto;
            padding: 0 5px;
            display: none;
        }
        #virus-list li {
            padding: 10px 12px;
            background: #0f3460;
            margin-bottom: 8px;
            border-radius: 10px;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-message {
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 15px;
        }
        .reset-link {
            color: #00d2ff;
            font-size: 16px;
            text-decoration: underline;
            cursor: pointer;
            margin-top: 10px;
        }
        .warning {
            color: #ff6b6b;
            font-weight: bold;
        }
        .safe {
            color: #2ed573;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="shield-icon">🛡️</div>
        <h1>安全卫士</h1>
        <p class="subtitle">保护你的手机免受威胁</p>

        <button id="scan-btn" onclick="startScan()">🔍 开始扫描</button>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <ul id="virus-list"></ul>
        <div id="resultArea" class="result-message"></div>
    </div>

    <script>
        // 搞笑病毒库
        const fakeViruses = [
            "🦠 懒癌病毒 (晚期)",
            "🧟 自拍狂魔病毒",
            "🌙 熬夜修仙病毒",
            "🍔 月半病毒 (极度危险)",
            "🎮 游戏成瘾病毒",
            "🛍️ 剁手病毒 (钱包已空)",
            "📱 手机依赖症病毒"
        ];

        const scanBtn = document.getElementById('scan-btn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const virusList = document.getElementById('virus-list');
        const resultArea = document.getElementById('resultArea');

        function startScan() {
            // 重置
            virusList.innerHTML = '';
            resultArea.innerHTML = '';
            progressFill.style.width = '0%';
            scanBtn.disabled = true;
            scanBtn.textContent = '扫描中...';
            progressBar.style.display = 'block';
            virusList.style.display = 'block';

            let progress = 0;
            const totalTime = 6000; // 总扫描时间6秒
            const intervalTime = totalTime / 100; // 进度更新频率

            const progressInterval = setInterval(() => {
                progress += 1;
                progressFill.style.width = progress + '%';
                if (progress >= 100) {
                    clearInterval(progressInterval);
                    scanComplete();
                }
            }, intervalTime);

            // 依次显示病毒，间隔错开
            fakeViruses.forEach((virus, index) => {
                setTimeout(() => {
                    const li = document.createElement('li');
                    li.innerHTML = `<span>⚠️</span> 发现威胁：${virus}`;
                    virusList.appendChild(li);
                    // 自动滚动到最新
                    virusList.scrollTop = virusList.scrollHeight;
                }, (index + 1) * 800); // 约0.8秒弹出一个
            });
        }

        function scanComplete() {
            scanBtn.textContent = '扫描完成';
            resultArea.innerHTML = `
                <div style="font-size:22px;">📋 扫描报告</div>
                <div style="color:#ff6b6b;">共发现 ${fakeViruses.length} 个虚假病毒</div>
                <div style="color:#2ed573; font-size:20px;">😂 放心，这只是一个玩笑！</div>
                <div style="font-size:14px; color:#aaa;">你的手机其实非常安全~</div>
                <span class="reset-link" onclick="resetScan()">🔄 再整一次？</span>
            `;
            virusList.style.display = 'none';
            progressBar.style.display = 'none';
        }

        function resetScan() {
            scanBtn.disabled = false;
            scanBtn.textContent = '🔍 开始扫描';
            progressFill.style.width = '0%';
            progressBar.style.display = 'none';
            virusList.innerHTML = '';
            virusList.style.display = 'none';
            resultArea.innerHTML = '';
        }
    </script>
</body>
</html>
